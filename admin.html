<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Content Manager — Hisham Hamza</title>
  <link rel="icon" type="image/jpeg" href="assets/img/logo.jpeg" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1115; --card: #181b22; --card2: #1f232c; --border: #2a2f3a;
      --text: #e7e9ee; --muted: #9aa3b2; --accent: #4f8cff; --accent-soft: rgba(79,140,255,.15);
      --ok: #2ecc71; --err: #ff5c5c; --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: Inter, system-ui, sans-serif; line-height: 1.5;
    }
    a { color: var(--accent); }
    .wrap { max-width: 880px; margin: 0 auto; padding: 28px 20px 80px; }
    header.bar {
      position: sticky; top: 0; z-index: 10; background: rgba(15,17,21,.92);
      backdrop-filter: blur(8px); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 14px; padding: 14px 20px;
    }
    header.bar h1 { font-size: 16px; margin: 0; font-weight: 700; }
    header.bar .spacer { flex: 1; }
    .btn {
      font: inherit; font-weight: 600; cursor: pointer; border-radius: 10px;
      border: 1px solid var(--border); background: var(--card2); color: var(--text);
      padding: 9px 16px; transition: .15s; white-space: nowrap;
    }
    .btn:hover { border-color: var(--accent); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn.ghost { background: transparent; }
    .btn.sm { padding: 5px 10px; font-size: 13px; }
    .btn.danger:hover { border-color: var(--err); color: var(--err); }

    .panel { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; margin-bottom: 22px; }
    .panel > h2 { margin: 0 0 4px; font-size: 18px; }
    .panel .hint { color: var(--muted); font-size: 13px; margin: 0 0 18px; }

    .item {
      background: var(--card2); border: 1px solid var(--border); border-radius: 12px;
      padding: 16px; margin-bottom: 14px;
    }
    .item-head { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .item-head .title { font-weight: 600; font-size: 14px; flex: 1; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .field { margin-bottom: 12px; }
    .field:last-child { margin-bottom: 0; }
    .field > label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .4px; }
    .i18n-grid { display: grid; grid-template-columns: 1fr; gap: 6px; }
    .lang-row { display: flex; align-items: flex-start; gap: 8px; }
    .lang-tag { flex: 0 0 34px; font-size: 11px; font-weight: 700; color: var(--accent); padding-top: 9px; text-transform: uppercase; }
    input, textarea {
      width: 100%; font: inherit; font-size: 14px; color: var(--text);
      background: var(--bg); border: 1px solid var(--border); border-radius: 9px; padding: 9px 11px;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--accent); }
    textarea { resize: vertical; min-height: 60px; }
    [dir="rtl"] input, input.ar, textarea.ar { direction: rtl; }

    .add-row { text-align: center; }
    .status { font-size: 14px; font-weight: 600; }
    .status.ok { color: var(--ok); }
    .status.err { color: var(--err); }
    .status.busy { color: var(--accent); }

    /* token gate */
    .gate { max-width: 460px; margin: 8vh auto; }
    .gate .panel { padding: 28px; }
    .gate p { color: var(--muted); font-size: 14px; }
    .gate label { display: block; font-size: 13px; font-weight: 600; margin: 16px 0 6px; }
    details.settings summary { cursor: pointer; color: var(--muted); font-size: 13px; margin-top: 14px; }
    details.settings .field { margin-top: 12px; }
    .hidden { display: none !important; }
    .muted { color: var(--muted); }
    code { background: var(--card2); padding: 1px 6px; border-radius: 5px; font-size: 13px; }
  </style>
</head>
<body>
  <!-- ============== LOGIN GATE ============== -->
  <div id="gate" class="gate">
    <div class="panel">
      <h2>Sign in</h2>
      <p>Enter your username and password to manage the site content.</p>
      <label for="user">Username</label>
      <input id="user" type="text" autocomplete="username" />
      <label for="pass">Password</label>
      <input id="pass" type="password" autocomplete="current-password" />

      <div style="margin-top:20px; display:flex; gap:10px; align-items:center;">
        <button id="loginBtn" class="btn primary">Sign in</button>
        <span id="gateStatus" class="status"></span>
      </div>
      <label style="margin-top:16px; display:flex; align-items:center; gap:8px; font-weight:500; color:var(--muted);">
        <input id="remember" type="checkbox" style="width:auto;" /> Stay signed in on this device
      </label>
    </div>
  </div>

  <!-- ============== EDITOR ============== -->
  <div id="app" class="hidden">
    <header class="bar">
      <h1>Content Manager</h1>
      <span class="spacer"></span>
      <span id="status" class="status"></span>
      <button id="reloadBtn" class="btn ghost sm">Reload</button>
      <button id="saveBtn" class="btn primary">Publish changes</button>
      <button id="logoutBtn" class="btn ghost sm">Sign out</button>
    </header>
    <div class="wrap" id="editor"></div>
  </div>

  <script src="assets/js/admin.js"></script>
</body>
</html>
